<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Test</title>
<style>
  body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
  button { padding: 12px 20px; font-size: 16px; cursor: pointer; }
  #result { margin-top: 20px; line-height: 1.6; white-space: pre-wrap; }
  .error { color: #c0392b; }
</style>
</head>
<body>

<h2>Real GPS + Address Lookup</h2>
<button onclick="getLocation()">Get My Real Location</button>
<div id="result">Click the button and allow location access.</div>

<script>
function getLocation() {
  const resultEl = document.getElementById("result");

  if (!navigator.geolocation) {
    resultEl.innerHTML = '<span class="error">Geolocation not supported by this browser.</span>';
    return;
  }

  resultEl.textContent = "Requesting GPS location...";

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      const { latitude, longitude, accuracy } = position.coords;

      resultEl.textContent =
        `GPS coordinates found:\nLat: ${latitude}\nLng: ${longitude}\nAccuracy: ~${Math.round(accuracy)} meters\n\nLooking up address...`;

      try {
        // Reverse geocode using OpenStreetMap Nominatim (free, no API key needed)
        const response = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`,
          { headers: { "Accept-Language": "en" } }
        );

        if (!response.ok) throw new Error("Reverse geocoding request failed");

        const data = await response.json();
        const address = data.display_name || "Address not found for these coordinates";

        resultEl.textContent =
          `GPS coordinates:\nLat: ${latitude}\nLng: ${longitude}\nAccuracy: ~${Math.round(accuracy)} meters\n\n` +
          `Resolved address:\n${address}`;

      } catch (err) {
        resultEl.innerHTML =
          `GPS coordinates:\nLat: ${latitude}\nLng: ${longitude}\n\n` +
          `<span class="error">Address lookup failed: ${err.message}</span>`;
      }
    },
    (error) => {
      let msg = "Unknown error.";
      if (error.code === error.PERMISSION_DENIED) msg = "You denied location access.";
      else if (error.code === error.POSITION_UNAVAILABLE) msg = "Location unavailable.";
      else if (error.code === error.TIMEOUT) msg = "Request timed out.";
      resultEl.innerHTML = `<span class="error">${msg}</span>`;
    },
    {
      enableHighAccuracy: true, // forces real GPS instead of coarse network location
      timeout: 10000,
      maximumAge: 0
    }
  );
}
</script>

</body>
</html>
