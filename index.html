<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Threadline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
  /* ---- Romantic palette ---- */
  --color-bg: #FFF7F9;
  --color-bg-deep: #FDECF1;
  --color-panel: #FFFFFF;
  --color-primary: #FF6F91;
  --color-primary-dark: #D6446B;
  --color-primary-soft: #FFB4C6;
  --color-gold: #E8B75C;
  --color-text: #2B1F24;
  --color-text-muted: #8A7680;
  --color-border: #F6DCE4;
  --color-bubble-mine: linear-gradient(135deg, #FFD1DC 0%, #FFC1D6 100%);
  --color-bubble-theirs: #FFFFFF;
  --color-danger: #E1435B;
  --shadow-soft: 0 8px 28px rgba(214, 68, 107, 0.10);
  --shadow-lift: 0 14px 40px rgba(214, 68, 107, 0.16);
  --font-display: "Fraunces", Georgia, serif;
  --font-body: "Quicksand", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-body);
}

body {
  min-height: 100dvh;
  background:
    radial-gradient(ellipse 90% 60% at 15% 0%, #FFE9F0 0%, transparent 60%),
    radial-gradient(ellipse 80% 50% at 100% 15%, #FFF3E9 0%, transparent 55%),
    var(--color-bg);
}
img { max-width: 100%; display: block; }
button { cursor: pointer; font-family: inherit; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
}

/* ---------------------------------------------------------------------------
   Ambient floating hearts (signature element)
   --------------------------------------------------------------------------- */
.floating-hearts {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.floating-hearts span {
  position: absolute;
  bottom: -40px;
  color: var(--color-primary-soft);
  opacity: 0.55;
  animation: floatUp linear infinite;
}
.floating-hearts span svg { width: 100%; height: 100%; display: block; }
@keyframes floatUp {
  0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.55; }
  90%  { opacity: 0.35; }
  100% { transform: translateY(-115vh) translateX(20px) rotate(25deg); opacity: 0; }
}

/* ---------------------------------------------------------------------------
   Password gate
   --------------------------------------------------------------------------- */
#gate-loading, #gate-password {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  padding: 24px;
}
.spinner {
  width: 42px;
  height: 42px;
  border: 3.5px solid var(--color-border);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.gate-card {
  background: var(--color-panel);
  border-radius: 28px;
  padding: 40px 30px 32px;
  max-width: 360px;
  width: 100%;
  box-shadow: var(--shadow-lift);
  text-align: center;
  border: 1px solid var(--color-border);
  position: relative;
  overflow: hidden;
}
.gate-card::before {
  content: "";
  position: absolute;
  top: -60px; right: -60px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, var(--color-primary-soft) 0%, transparent 70%);
  opacity: 0.6;
}
.gate-icon {
  width: 56px; height: 56px;
  margin: 0 auto 16px;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-soft);
  position: relative;
}
.gate-icon svg { width: 28px; height: 28px; color: #fff; }
.gate-card h1 {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 600;
  margin: 0 0 6px;
  position: relative;
}
.gate-card p {
  color: var(--color-text-muted);
  font-size: 0.9rem;
  margin: 0 0 22px;
  position: relative;
}
.gate-card input {
  width: 100%;
  padding: 14px 18px;
  border: 1.5px solid var(--color-border);
  border-radius: 14px;
  font-size: 16px;
  outline: none;
  margin-bottom: 14px;
  background: var(--color-bg);
  font-family: inherit;
  position: relative;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.gate-card input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 4px rgba(255, 111, 145, 0.12);
}
.gate-card button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #fff;
  font-weight: 700;
  font-size: 1rem;
  font-family: inherit;
  box-shadow: var(--shadow-soft);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  position: relative;
}
.gate-card button:active { transform: scale(0.97); }
.gate-error {
  color: var(--color-danger);
  font-size: 0.84rem;
  margin: -6px 0 14px;
  display: none;
  position: relative;
  font-weight: 600;
}
.gate-error.show { display: block; }

/* ---------------------------------------------------------------------------
   Chat shell
   --------------------------------------------------------------------------- */
#chat-app {
  display: none;
  flex-direction: column;
  height: 100dvh;
  max-width: 560px;
  margin: 0 auto;
  background: transparent;
  position: relative;
  z-index: 1;
  box-shadow: 0 0 60px rgba(214, 68, 107, 0.08);
}

.chat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
}
.chat-header-logo {
  width: 42px; height: 42px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  display: flex; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0;
  box-shadow: var(--shadow-soft);
}
.chat-header-logo svg { width: 22px; height: 22px; }
.chat-header-info { flex: 1; min-width: 0; }
.chat-header-info h1 {
  font-family: var(--font-display);
  font-size: 1.15rem;
  margin: 0;
  font-weight: 600;
  letter-spacing: 0.01em;
}
.chat-header-info span {
  font-size: 0.76rem;
  color: var(--color-text-muted);
  display: flex;
  align-items: center;
  gap: 5px;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #4ECB8B;
  display: inline-block;
  box-shadow: 0 0 0 3px rgba(78, 203, 139, 0.18);
}

#messages-container {
  position: relative;
  flex: 1;
  overflow-y: auto;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  -webkit-overflow-scrolling: touch;
  background-image:
    linear-gradient(rgba(255, 247, 249, 0.82), rgba(255, 247, 249, 0.55)),
    url("chat-background.jpg");
  background-size: 380px;
  background-position: center;
  background-repeat: repeat;
  scroll-behavior: smooth;
}

.date-separator { display: flex; justify-content: center; margin: 16px 0 12px; }
.date-separator span {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(6px);
  color: var(--color-text-muted);
  font-size: 0.72rem;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--color-border);
}

.message-row {
  display: flex;
  flex-direction: column;
  max-width: 78%;
  margin-bottom: 12px;
  animation: bubbleIn 0.28s ease;
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(8px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.message-row.theirs { align-self: flex-start; align-items: flex-start; }
.message-row.mine { align-self: flex-end; align-items: flex-end; }

.sender-name {
  font-size: 0.74rem;
  font-weight: 700;
  color: var(--color-primary-dark);
  margin: 0 6px 3px;
  letter-spacing: 0.01em;
}

.bubble {
  padding: 11px 15px;
  border-radius: 18px;
  box-shadow: var(--shadow-soft);
  word-break: break-word;
}
.theirs .bubble {
  background: var(--color-bubble-theirs);
  border: 1px solid var(--color-border);
  border-bottom-left-radius: 5px;
}
.mine .bubble {
  background: var(--color-bubble-mine);
  border-bottom-right-radius: 5px;
}
.text-bubble { font-size: 0.95rem; line-height: 1.48; white-space: pre-wrap; }
.image-bubble { padding: 4px; }
.chat-image { border-radius: 13px; max-height: 280px; width: auto; cursor: pointer; }

.message-time {
  font-size: 0.68rem;
  color: var(--color-text-muted);
  margin: 4px 6px 0;
}

/* Composer */
.composer {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--color-border);
  flex-shrink: 0;
}
.composer textarea {
  flex: 1;
  resize: none;
  border: 1.5px solid var(--color-border);
  border-radius: 22px;
  padding: 11px 18px;
  font-size: 16px;
  max-height: 140px;
  min-height: 44px;
  outline: none;
  background: var(--color-bg);
  font-family: inherit;
  color: var(--color-text);
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.composer textarea:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 4px rgba(255, 111, 145, 0.12);
}
.composer textarea::placeholder { color: var(--color-text-muted); }

.icon-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--color-bg-deep);
  color: var(--color-primary-dark);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s ease, transform 0.15s ease;
}
.icon-btn svg { width: 22px; height: 22px; }
.icon-btn:hover { background: var(--color-primary-soft); }
.icon-btn:active { transform: scale(0.92); }

.send-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #fff;
  border: none;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: var(--shadow-soft);
  transition: transform 0.15s ease;
}
.send-btn svg { width: 20px; height: 20px; margin-left: -2px; }
.send-btn:active { transform: scale(0.9); }
.send-btn:disabled { background: #F3C6D2; box-shadow: none; }

.typing-indicator {
  padding: 6px 18px;
  font-size: 0.8rem;
  color: var(--color-primary-dark);
  font-style: italic;
  font-weight: 600;
  background: transparent;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.typing-dots { display: inline-flex; gap: 3px; }
.typing-dots span {
  width: 5px; height: 5px;
  background: var(--color-primary);
  border-radius: 50%;
  animation: typingBounce 1.1s infinite ease-in-out;
}
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* Upload progress */
.upload-progress {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 11px 18px;
  background: var(--color-bg-deep);
  font-size: 0.84rem;
  color: var(--color-primary-dark);
  font-weight: 600;
  flex-shrink: 0;
}
.upload-progress .spinner { width: 17px; height: 17px; border-width: 2.5px; }

/* Image preview before sending */
#image-preview-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(43, 31, 36, 0.92);
  z-index: 1500;
  flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px;
}
#image-preview-img { max-height: 65vh; max-width: 100%; border-radius: 16px; margin-bottom: 22px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
.image-preview-actions { display: flex; gap: 12px; width: 100%; max-width: 320px; }
.image-preview-actions button {
  flex: 1;
  padding: 13px;
  border: none;
  border-radius: 999px;
  font-weight: 700;
  font-size: 0.94rem;
  font-family: inherit;
  transition: transform 0.15s ease;
}
.image-preview-actions button:active { transform: scale(0.96); }
.image-preview-actions .cancel-btn { background: #fff; color: var(--color-text); }
.image-preview-actions .send-confirm-btn {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #fff;
  box-shadow: var(--shadow-soft);
}

/* Full-screen image viewer */
#image-viewer {
  display: none;
  position: fixed; inset: 0;
  background: rgba(20, 12, 15, 0.97);
  z-index: 1600;
  flex-direction: column;
}
.viewer-top { display: flex; align-items: center; justify-content: space-between; padding: 16px; color: #fff; }
.viewer-top-info { display: flex; flex-direction: column; }
.viewer-top-info span:first-child { font-weight: 700; font-size: 0.92rem; }
.viewer-top-info span:last-child { font-size: 0.76rem; color: rgba(255,255,255,0.6); }
.viewer-top .icon-btn { color: #fff; background: rgba(255,255,255,0.1); }
.viewer-top .icon-btn:hover { background: rgba(255,255,255,0.2); }
.viewer-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 12px; overflow: auto; }
.viewer-body img { max-width: 100%; max-height: 100%; border-radius: 8px; }
.viewer-bottom { display: flex; justify-content: center; padding: 20px; }
.viewer-download {
  display: inline-flex; align-items: center; gap: 8px;
  color: #fff; background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  padding: 11px 22px; border-radius: 999px; font-size: 0.9rem; font-weight: 700;
  text-decoration: none;
}
.viewer-download svg { width: 16px; height: 16px; }

/* Toast */
.app-toast {
  position: fixed;
  left: 50%; bottom: 24px;
  transform: translateX(-50%) translateY(20px);
  background: var(--color-text); color: #fff;
  padding: 13px 22px; border-radius: 999px;
  font-size: 0.9rem;
  font-weight: 600;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
  z-index: 2000;
  max-width: 90vw;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}
.app-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.app-toast.error { background: var(--color-danger); }

/* Random question box */
.random-question-box {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 11px 16px;
  background: linear-gradient(90deg, #FFF0F5 0%, #FFF7F9 100%);
  border-top: 1px solid var(--color-border);
}

.random-question-box span {
  color: var(--color-text-muted);
  font-size: 13px;
  line-height: 1.3;
  font-weight: 600;
}

#random-question-btn {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1.5px solid var(--color-primary);
  border-radius: 999px;
  padding: 9px 15px;
  background: #ffffff;
  color: var(--color-primary-dark);
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition:
    background 0.2s ease,
    color 0.2s ease,
    transform 0.2s ease,
    box-shadow 0.2s ease;
}
#random-question-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

#random-question-btn:hover {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #ffffff;
  box-shadow: var(--shadow-soft);
}

#random-question-btn:active {
  transform: scale(0.96);
}

#random-question-btn:disabled {
  cursor: not-allowed;
  opacity: 0.6;
}

.question-preview {
  flex-shrink: 0;
  margin: 10px 14px;
  padding: 16px;
  background: #ffffff;
  border: 1px solid var(--color-border);
  border-radius: 18px;
  box-shadow: var(--shadow-lift);
  position: relative;
  overflow: hidden;
}
.question-preview::before {
  content: "";
  position: absolute;
  top: -30px; left: -30px;
  width: 100px; height: 100px;
  background: radial-gradient(circle, var(--color-primary-soft) 0%, transparent 70%);
  opacity: 0.5;
}

.question-preview-label {
  margin-bottom: 8px;
  color: var(--color-primary-dark);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  display: flex;
  align-items: center;
  gap: 5px;
  position: relative;
}

.question-preview-text {
  color: var(--color-text);
  font-size: 16px;
  font-weight: 600;
  line-height: 1.45;
  font-family: var(--font-display);
  position: relative;
}

.question-preview-count {
  margin-top: 10px;
  color: var(--color-text-muted);
  font-size: 12px;
  position: relative;
}

.question-preview-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 16px;
  position: relative;
}

.question-preview-actions button {
  border: none;
  border-radius: 12px;
  padding: 10px 14px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s ease, opacity 0.15s ease;
}
.question-preview-actions button:active { transform: scale(0.95); }

.question-cancel-btn {
  background: var(--color-bg-deep);
  color: var(--color-text-muted);
}

.question-again-btn {
  background: #FFE4EC;
  color: var(--color-primary-dark);
}

.question-send-btn {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: #ffffff;
  box-shadow: var(--shadow-soft);
}

.question-again-btn:disabled {
  cursor: not-allowed;
  opacity: 0.45;
}

/* Scrollbar polish */
#messages-container::-webkit-scrollbar { width: 5px; }
#messages-container::-webkit-scrollbar-thumb { background: var(--color-primary-soft); border-radius: 10px; }

#enable-notifications-btn {
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 600;
  
  border: 1px solid #ff5ca8;
  border-radius: 999px;
  
  background: rgba(255, 255, 255, 0.9);
  color: #ff5ca8;
  
  white-space: nowrap;
}
/* ---------------------------------------------------------------------------
   Responsive breakpoints
   --------------------------------------------------------------------------- */
@media (max-width: 380px) {
  .random-question-box { padding: 9px 12px; }
  .random-question-box span { font-size: 12px; }
  #random-question-btn { padding: 7px 11px; font-size: 11px; }
  .message-row { max-width: 86%; }
  .chat-header-info h1 { font-size: 1.05rem; }
}

/* Tablet and up: give the chat some breathing room and frame it like a card */
@media (min-width: 700px) {
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #chat-app {
    height: min(100dvh, 880px);
    border-radius: 28px;
    overflow: hidden;
    margin: 24px auto;
    border: 1px solid var(--color-border);
  }
}

/* Laptop / desktop: wider canvas, larger bubbles, roomier composer */
@media (min-width: 1024px) {
  #chat-app { max-width: 640px; }
  .message-row { max-width: 68%; }
  .text-bubble { font-size: 1rem; }
  .chat-header { padding: 18px 24px; }
  .composer { padding: 16px 20px calc(16px + env(safe-area-inset-bottom)); }
}

/* Short/landscape phones: keep header and composer compact */
@media (max-height: 480px) and (orientation: landscape) {
  .chat-header { padding: 8px 16px; }
  .composer { padding: 8px 12px; }
  .random-question-box { display: none; }
}
</style>
</head>
<body>

<div class="floating-hearts" aria-hidden="true">
  <span style="left:8%; width:18px; height:18px; animation-duration:14s; animation-delay:0s;">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.7-10.2-9.4C.3 8.9 1.4 5.4 4.6 4.2c2-.8 4.1 0 5.4 1.8C11.3 4.2 13.4 3.4 15.4 4.2c3.2 1.2 4.3 4.7 2.8 7.4C15.5 16.3 12 21 12 21z"/></svg>
  </span>
  <span style="left:24%; width:12px; height:12px; animation-duration:11s; animation-delay:2s;">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.7-10.2-9.4C.3 8.9 1.4 5.4 4.6 4.2c2-.8 4.1 0 5.4 1.8C11.3 4.2 13.4 3.4 15.4 4.2c3.2 1.2 4.3 4.7 2.8 7.4C15.5 16.3 12 21 12 21z"/></svg>
  </span>
  <span style="left:62%; width:16px; height:16px; animation-duration:16s; animation-delay:4s;">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.7-10.2-9.4C.3 8.9 1.4 5.4 4.6 4.2c2-.8 4.1 0 5.4 1.8C11.3 4.2 13.4 3.4 15.4 4.2c3.2 1.2 4.3 4.7 2.8 7.4C15.5 16.3 12 21 12 21z"/></svg>
  </span>
  <span style="left:82%; width:14px; height:14px; animation-duration:13s; animation-delay:1s;">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.7-10.2-9.4C.3 8.9 1.4 5.4 4.6 4.2c2-.8 4.1 0 5.4 1.8C11.3 4.2 13.4 3.4 15.4 4.2c3.2 1.2 4.3 4.7 2.8 7.4C15.5 16.3 12 21 12 21z"/></svg>
  </span>
  <span style="left:44%; width:10px; height:10px; animation-duration:9s; animation-delay:5s;">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.7-10.2-9.4C.3 8.9 1.4 5.4 4.6 4.2c2-.8 4.1 0 5.4 1.8C11.3 4.2 13.4 3.4 15.4 4.2c3.2 1.2 4.3 4.7 2.8 7.4C15.5 16.3 12 21 12 21z"/></svg>
  </span>
</div>

<!-- Brief loading state while the page decides whether you're unlocked -->
<div id="gate-loading">
  <div class="spinner"></div>
</div>

<!-- Password gate -->
<div id="gate-password" style="display:none;">
  <div class="gate-card">
    <div class="gate-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.7-10.2-9.4C.3 8.9 1.4 5.4 4.6 4.2c2-.8 4.1 0 5.4 1.8C11.3 4.2 13.4 3.4 15.4 4.2c3.2 1.2 4.3 4.7 2.8 7.4C15.5 16.3 12 21 12 21z"/></svg>
    </div>
    <h1>Threadline</h1>
    <p>Enter the password to come in.</p>
    <form id="password-form">
      <input type="password" id="password-input" autocomplete="off" autocapitalize="off" placeholder="Password" required />
      <div class="gate-error" id="password-error">Incorrect password. Try again.</div>
      <button type="submit">Enter</button>
    </form>
  </div>
</div>

<!-- Chat -->
<div id="chat-app">
  <div class="chat-header">
    <div class="chat-header-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.7-10.2-9.4C.3 8.9 1.4 5.4 4.6 4.2c2-.8 4.1 0 5.4 1.8C11.3 4.2 13.4 3.4 15.4 4.2c3.2 1.2 4.3 4.7 2.8 7.4C15.5 16.3 12 21 12 21z"/></svg>
    </div>
    <div class="chat-header-info">
      <h1>Threadline</h1>
      <span><i class="status-dot"></i>Shared room</span>
     
    </div>
     <button type="button" id="enable-notifications-btn">
   Enable notifications
 </button>
  </div>

  <div id="messages-container"></div>

  <div class="upload-progress" id="upload-progress">
    <div class="spinner"></div>
    <span class="upload-progress-text">Uploading…</span>
  </div>

  <div class="typing-indicator" id="typing-indicator" style="display:none;">
    <span class="typing-dots"><span></span><span></span><span></span></span>
  </div>

<div class="random-question-box">
  <span>Are you out of what to say?</span>
  <button type="button" id="random-question-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.7-10.2-9.4C.3 8.9 1.4 5.4 4.6 4.2c2-.8 4.1 0 5.4 1.8C11.3 4.2 13.4 3.4 15.4 4.2c3.2 1.2 4.3 4.7 2.8 7.4C15.5 16.3 12 21 12 21z"/></svg>
    Random question
  </button>
</div>

<div id="question-preview" class="question-preview" style="display:none;">
  <div class="question-preview-label">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    Question preview
  </div>
  <div id="question-preview-text" class="question-preview-text"></div>
  <div class="question-preview-count">
    Changes remaining: <strong id="question-changes-left">3</strong>
  </div>
  <div class="question-preview-actions">
    <button type="button" id="question-cancel-btn" class="question-cancel-btn">Cancel</button>
    <button type="button" id="question-again-btn" class="question-again-btn">Try another</button>
    <button type="button" id="question-send-btn" class="question-send-btn">Send question</button>
  </div>
</div>

  <div class="composer">
    <button class="icon-btn" id="image-btn" aria-label="Attach image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg>
    </button>
    <input type="file" id="image-file-input" accept="image/jpeg,image/jpg,image/png,image/webp,image/gif" style="display:none" />
    <textarea id="message-input" rows="1" placeholder="Type a message" maxlength="4000"></textarea>
    <button class="send-btn" id="send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<!-- Image preview before sending -->
<div id="image-preview-modal">
  <img id="image-preview-img" alt="Preview" />
  <div class="image-preview-actions">
    <button class="cancel-btn" id="image-preview-cancel">Cancel</button>
    <button class="send-confirm-btn" id="image-preview-send">Send</button>
  </div>
</div>

<!-- Full-screen image viewer -->
<div id="image-viewer">
  <div class="viewer-top">
    <div class="viewer-top-info">
      <span id="viewer-sender"></span>
      <span id="viewer-time"></span>
    </div>
    <button class="icon-btn" id="viewer-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <div class="viewer-body">
    <img id="viewer-img" alt="Full size" />
  </div>
  <div class="viewer-bottom">
    <a class="viewer-download" id="viewer-download" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      Download
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="questions.js"></script>
<script src="app.js"></script>

</body>
</html>
