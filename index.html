<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Threadline — Private Chats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body class="home-body">

<div class="home-shell">
  <div class="home-list-panel">

    <div class="home-topbar">
      <div class="home-brand">
        <div class="home-brand-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        </div>
        <span class="home-brand-name">Threadline</span>
      </div>

      <div class="home-profile">
        <div class="home-profile-info">
          <span class="home-profile-name" id="profile-name-display">Guest</span>
          <button class="home-profile-edit" id="edit-profile-btn">Edit profile</button>
        </div>
        <button id="profile-avatar-btn" style="border:none;background:none;padding:0;">
          <span id="profile-avatar-display"></span>
        </button>
      </div>
    </div>

    <div class="home-actions">
      <button class="btn btn-primary" id="create-room-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Create New Room
      </button>
      <button class="btn btn-secondary" id="join-room-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
        Join Room
      </button>
    </div>

    <div class="section-title">Recent Chats</div>

    <div class="recent-list" id="recent-list"></div>

    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      <strong>No recent chats yet.</strong>
      <span>Create or join a room to start chatting.</span>
    </div>

  </div>

  <div class="home-empty-panel">
    Select a chat, or create a new room to get started.
  </div>
</div>

<!-- Edit profile modal -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal-sheet">
    <h2>Edit profile</h2>
    <div class="avatar-picker">
      <button class="avatar-picker-btn" id="avatar-picker-btn">
        <span id="avatar-picker-preview"></span>
      </button>
      <div>
        <div class="avatar-picker-label">Change photo</div>
        <div class="field-hint">JPG, PNG, or WEBP</div>
      </div>
      <input type="file" id="avatar-file-input" accept="image/*" style="display:none" />
    </div>
    <div class="field">
      <label for="profile-name-input">Display name</label>
      <input type="text" id="profile-name-input" maxlength="40" placeholder="Your name" />
    </div>
    <button class="btn btn-primary btn-block" id="save-profile-btn">Save</button>
  </div>
</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="rooms.js"></script>
<script>
  // -------------------------------------------------------------------------
  // Homepage bootstrap
  // -------------------------------------------------------------------------
  function renderProfileHeader() {
    const profile = getProfile();
    document.getElementById("profile-name-display").textContent = profile.displayName || "Guest";
    document.getElementById("profile-avatar-display").innerHTML =
      avatarHtml(profile.displayName || "Guest", profile.profileImage, "avatar-sm");
  }

  function openProfileModal() {
    const profile = getProfile();
    document.getElementById("profile-name-input").value = profile.displayName || "";
    document.getElementById("avatar-picker-preview").innerHTML =
      avatarHtml(profile.displayName || "Guest", profile.profileImage, "avatar-lg");
    document.getElementById("profile-modal").classList.add("open");
  }

  let pendingAvatarDataUrl = null;

  document.getElementById("edit-profile-btn").addEventListener("click", openProfileModal);
  document.getElementById("profile-avatar-btn").addEventListener("click", openProfileModal);

  document.getElementById("avatar-picker-btn").addEventListener("click", () => {
    document.getElementById("avatar-file-input").click();
  });

  document.getElementById("avatar-file-input").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!isAllowedImageType(file)) {
      showToast("Please choose a JPG, PNG, WEBP, or GIF image.", true);
      return;
    }
    if (!isAllowedImageSize(file)) {
      showToast("This image is too large. Choose an image below 10MB.", true);
      return;
    }
    const compressed = await compressImage(file, 400, 0.85);
    pendingAvatarDataUrl = await readFileAsDataUrl(compressed);
    document.getElementById("avatar-picker-preview").innerHTML =
      `<img class="avatar avatar-lg" src="${pendingAvatarDataUrl}" alt="Preview" />`;
  });

  document.getElementById("save-profile-btn").addEventListener("click", () => {
    const name = document.getElementById("profile-name-input").value.trim();
    if (!name) {
      showToast("Please enter a display name.", true);
      return;
    }
    saveProfile(name, pendingAvatarDataUrl);
    pendingAvatarDataUrl = null;
    document.getElementById("profile-modal").classList.remove("open");
    renderProfileHeader();
    showToast("Profile updated.");
  });

  document.getElementById("profile-modal").addEventListener("click", (e) => {
    if (e.target.id === "profile-modal") {
      document.getElementById("profile-modal").classList.remove("open");
    }
  });

  document.getElementById("create-room-btn").addEventListener("click", () => {
    window.location.href = "create-room.html";
  });
  document.getElementById("join-room-btn").addEventListener("click", () => {
    window.location.href = "join-room.html";
  });

  document.getElementById("recent-list").addEventListener("click", (e) => {
    const card = e.target.closest(".chat-card");
    if (!card) return;
    window.location.href = `chat.html?room=${encodeURIComponent(card.dataset.roomId)}`;
  });

  async function init() {
    renderProfileHeader();
    if (!hasProfile()) {
      openProfileModal();
    }
    await loadRecentChatsIntoDom(
      document.getElementById("recent-list"),
      document.getElementById("empty-state")
    );
  }

  init();
</script>

</body>
</html>
