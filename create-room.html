<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Create Room — Threadline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page">
  <div class="page-header">
    <button class="icon-btn" id="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <h1>Create a room</h1>
  </div>

  <div class="page-content">
    <div class="form-card">
      <div class="field">
        <label for="room-name-input">Room name or topic</label>
        <input type="text" id="room-name-input" maxlength="60" placeholder="e.g. Business Discussion" />
      </div>

      <div class="field">
        <label>Maximum users</label>
        <div class="max-users-grid" id="max-users-grid">
          <button type="button" class="max-users-option" data-value="2">2</button>
          <button type="button" class="max-users-option" data-value="3">3</button>
          <button type="button" class="max-users-option" data-value="4">4</button>
          <button type="button" class="max-users-option" data-value="5">5</button>
          <button type="button" class="max-users-option" data-value="6">6</button>
          <button type="button" class="max-users-option" data-value="7">7</button>
          <button type="button" class="max-users-option" data-value="8">8</button>
          <button type="button" class="max-users-option" data-value="9">9</button>
          <button type="button" class="max-users-option" data-value="10">10</button>
        </div>
        <div class="field-hint">Choose how many people (including you) can join this room.</div>
      </div>

      <button class="btn btn-primary btn-block" id="create-btn">Create Room</button>

      <div class="invite-link-box" id="invite-link-box">
        <strong>Room created 🎉</strong>
        <div class="field-hint">Share this link so others can join.</div>
        <div class="link-row">
          <input type="text" id="invite-link-input" readonly />
          <button class="btn btn-secondary" id="copy-link-btn">Copy</button>
        </div>
        <button class="btn btn-primary btn-block" id="go-to-chat-btn" style="margin-top:14px;">Open Chat</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="rooms.js"></script>
<script>
  let selectedMax = 2;

  document.getElementById("back-btn").addEventListener("click", () => {
    window.location.href = "index.html";
  });

  const grid = document.getElementById("max-users-grid");
  grid.addEventListener("click", (e) => {
    const btn = e.target.closest(".max-users-option");
    if (!btn) return;
    grid.querySelectorAll(".max-users-option").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedMax = parseInt(btn.dataset.value, 10);
  });
  grid.querySelector('[data-value="2"]').classList.add("selected");

  let createdRoom = null;

  document.getElementById("create-btn").addEventListener("click", async () => {
    const name = document.getElementById("room-name-input").value.trim();
    if (!name) {
      showToast("Please enter a room name or topic.", true);
      return;
    }

    const profile = getProfile();
    if (!profile.displayName) {
      showToast("Please set a display name first.", true);
      window.location.href = "index.html";
      return;
    }

    const createBtn = document.getElementById("create-btn");
    createBtn.disabled = true;
    createBtn.textContent = "Creating…";

    try {
      const result = await createRoom({
        name,
        maximumMembers: selectedMax,
        displayName: profile.displayName,
        profileImageDataUrl: profile.profileImage
      });

      createdRoom = result;
      document.getElementById("invite-link-input").value = result.inviteLink;
      document.getElementById("invite-link-box").classList.add("show");
      createBtn.style.display = "none";
    } catch (err) {
      console.error(err);
      showToast(err.message || "Could not create the room.", true);
      createBtn.disabled = false;
      createBtn.textContent = "Create Room";
    }
  });

  document.getElementById("copy-link-btn").addEventListener("click", async () => {
    const input = document.getElementById("invite-link-input");
    try {
      await navigator.clipboard.writeText(input.value);
      showToast("Link copied to clipboard.");
    } catch {
      input.select();
      showToast("Select and copy the link above.", true);
    }
  });

  document.getElementById("go-to-chat-btn").addEventListener("click", () => {
    if (createdRoom) {
      window.location.href = `chat.html?room=${encodeURIComponent(createdRoom.roomId)}`;
    }
  });
</script>

</body>
</html>
