<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Join Room — Threadline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page">
  <div class="page-header">
    <button class="icon-btn" id="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <h1>Join a room</h1>
  </div>

  <div class="page-content">

    <!-- No token in URL: ask user to paste/enter a link -->
    <div class="form-card" id="no-token-card" style="display:none;">
      <div class="field">
        <label for="link-input">Paste invite link</label>
        <input type="text" id="link-input" placeholder="https://.../join-room.html?token=..." />
      </div>
      <button class="btn btn-primary btn-block" id="go-link-btn">Continue</button>
    </div>

    <!-- Token present: show join form -->
    <div class="form-card" id="join-form-card" style="display:none;">
      <div class="join-room-preview" id="room-preview">
        <span id="room-preview-avatar"></span>
        <h2 id="room-preview-name">Loading…</h2>
        <p id="room-preview-meta"></p>
      </div>

      <div class="avatar-picker" style="justify-content:center; margin-bottom:24px;">
        <button class="avatar-picker-btn" id="avatar-picker-btn">
          <span id="avatar-picker-preview"></span>
        </button>
        <div>
          <div class="avatar-picker-label">Add photo (optional)</div>
        </div>
        <input type="file" id="avatar-file-input" accept="image/*" style="display:none" />
      </div>

      <div class="field">
        <label for="display-name-input">Your display name</label>
        <input type="text" id="display-name-input" maxlength="40" placeholder="Enter your name" />
      </div>

      <button class="btn btn-primary btn-block" id="join-btn">Join Room</button>
    </div>

    <!-- Nothing shown if room is invalid/full — spec requires silence -->
    <div id="silent-spinner" style="display:none;" class="page-content">
      <div style="display:flex;justify-content:center;padding:60px 0;">
        <div class="spinner"></div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="rooms.js"></script>
<script>
  document.getElementById("back-btn").addEventListener("click", () => {
    window.location.href = "index.html";
  });

  const params = new URLSearchParams(window.location.search);
  let inviteToken = (params.get("token") || "").trim();

  let pendingAvatarDataUrl = null;

  function showCard(id) {
    ["no-token-card", "join-form-card", "silent-spinner"].forEach(cardId => {
      document.getElementById(cardId).style.display = cardId === id ? "block" : "none";
    });
  }

  document.getElementById("go-link-btn").addEventListener("click", () => {
    const raw = document.getElementById("link-input").value.trim();
    try {
      const url = new URL(raw);
      const token = url.searchParams.get("token");
      if (!token) throw new Error("no token");
      window.location.href = `join-room.html?token=${encodeURIComponent(token)}`;
    } catch {
      showToast("That doesn't look like a valid invite link.", true);
    }
  });

  document.getElementById("avatar-picker-btn").addEventListener("click", () => {
    document.getElementById("avatar-file-input").click();
  });

  document.getElementById("avatar-file-input").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!isAllowedImageType(file)) {
      showToast("Please choose a JPG, PNG, WEBP, or GIF image.", true);
      return;
    }
    if (!isAllowedImageSize(file)) {
      showToast("This image is too large. Choose an image below 10MB.", true);
      return;
    }
    const compressed = await compressImage(file, 400, 0.85);
    pendingAvatarDataUrl = await readFileAsDataUrl(compressed);
    document.getElementById("avatar-picker-preview").innerHTML =
      `<img class="avatar avatar-lg" src="${pendingAvatarDataUrl}" alt="Preview" />`;
  });

  document.getElementById("join-btn").addEventListener("click", async () => {
    const name = document.getElementById("display-name-input").value.trim();
    if (!name) {
      showToast("Please enter your display name.", true);
      return;
    }

    const joinBtn = document.getElementById("join-btn");
    joinBtn.disabled = true;
    joinBtn.textContent = "Joining…";

    const profile = getProfile();
    const result = await joinRoom({
      inviteToken,
      displayName: name,
      profileImageDataUrl: pendingAvatarDataUrl || profile.profileImage
    });

    if (result.accepted) {
      saveRecentRoom({
        room_id: result.roomId,
        room_name: document.getElementById("room-preview-name").textContent,
        invite_token: inviteToken
      });
      window.location.href = `chat.html?room=${encodeURIComponent(result.roomId)}`;
    } else {
      // Per spec: never reveal WHY (full, invalid, inactive). Show only a
      // silent, permanent spinner — no error text, no state that leaks info.
      showCard("silent-spinner");
    }
  });

  async function init() {
    document.getElementById("avatar-picker-preview").innerHTML = avatarHtml("?", null, "avatar-lg");

    if (!inviteToken) {
      showCard("no-token-card");
      return;
    }

    const preview = await getRoomPreview(inviteToken);
    if (!preview) {
      // Invalid/inactive token — stay silent per spec.
      showCard("silent-spinner");
      return;
    }

    showCard("join-form-card");
    document.getElementById("room-preview-avatar").innerHTML = avatarHtml(preview.name, null, "avatar-lg");
    document.getElementById("room-preview-name").textContent = preview.name;
    document.getElementById("room-preview-meta").textContent =
      `${preview.current_members}/${preview.maximum_members} members`;

    const profile = getProfile();
    if (profile.displayName) {
      document.getElementById("display-name-input").value = profile.displayName;
    }
    if (profile.profileImage) {
      document.getElementById("avatar-picker-preview").innerHTML =
        `<img class="avatar avatar-lg" src="${profile.profileImage}" alt="Preview" />`;
    }
  }

  init();
</script>

</body>
</html>
