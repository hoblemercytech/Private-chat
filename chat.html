<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Chat — Threadline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Shown briefly while membership is being verified -->
<div id="loading-state">
  <div class="spinner"></div>
</div>

<!-- Shown if the room is full, invalid, or the user isn't a member -->
<div id="error-state" style="display:none;">
  <div class="error-card">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    <p id="error-message">Something went wrong.</p>
    <button class="btn btn-primary" id="error-back-btn">Back to home</button>
  </div>
</div>

<div id="chat-app">

  <div class="chat-header">
    <button class="icon-btn" id="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <span id="room-icon"></span>
    <div class="chat-header-info">
      <span id="room-name">Room</span>
      <span id="member-count-line">0 members • 0 online</span>
    </div>
    <div class="menu-wrapper">
      <button class="icon-btn" id="menu-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
      </button>
      <div class="menu-dropdown" id="menu-dropdown">
        <button id="menu-view-members">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          View members
        </button>
        <button id="menu-copy-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
          Copy invite link
        </button>
      </div>
    </div>
  </div>

  <div id="messages-container"></div>

  <div class="upload-progress" id="upload-progress">
    <div class="spinner"></div>
    <span class="upload-progress-text">Uploading…</span>
  </div>

  <div class="composer">
    <button class="icon-btn" id="image-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
    </button>
    <input type="file" id="image-file-input" accept="image/jpeg,image/jpg,image/png,image/webp,image/gif" style="display:none" />
    <textarea id="message-input" rows="1" placeholder="Type a message" maxlength="4000"></textarea>
    <button class="send-btn" id="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>

  <!-- Member list side panel (tap the dimmed backdrop or the X to close) -->
  <div class="member-list-panel" id="member-list-panel">
    <div class="member-panel-sheet">
      <div class="member-panel-header">
        <h3>Members</h3>
        <button class="icon-btn" id="member-panel-close" style="width:44px;height:44px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div id="member-list"></div>
    </div>
  </div>

</div>

<!-- Image preview before sending -->
<div id="image-preview-modal">
  <img id="image-preview-img" alt="Preview" />
  <div class="image-preview-actions">
    <button class="btn btn-secondary" id="image-preview-cancel">Cancel</button>
    <button class="btn btn-primary" id="image-preview-send">Send</button>
  </div>
</div>

<!-- Full-screen image viewer -->
<div id="image-viewer">
  <div class="viewer-top">
    <div class="viewer-top-info">
      <span id="viewer-sender"></span>
      <span id="viewer-time"></span>
    </div>
    <button class="icon-btn" id="viewer-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <div class="viewer-body">
    <img id="viewer-img" alt="Full size" />
  </div>
  <div class="viewer-bottom">
    <a class="viewer-download" id="viewer-download" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      Download
    </a>
  </div>
</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="chat.js"></script>
<script>
  document.getElementById("error-back-btn").addEventListener("click", () => {
    window.location.href = "index.html";
  });
</script>

</body>
</html>
